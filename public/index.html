<!DOCTYPE html>
<html>
<head>
  <title>Perplexity Billing Support Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111827;
      --panel-2: #0f172a;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #1f2937;
      --accent: #10a37f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    /* MAIN WRAPPER */
    .container {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* TITLE */
    .title {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    /* CONTEXT BAR */
    #contextBar {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
      display: none;
    }

    /* SCENARIO SELECT ROW */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    select {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      outline: none;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      opacity: 0.9;
    }

    /* CHAT AREA */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 420px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: #1f2937;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-left: 6px;
    }

    /* INPUT BAR */
    .inputBar {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    input::placeholder {
      color: #6b7280;
    }

    .sendBtn {
      padding: 12px 18px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sendBtn:hover {
      opacity: 0.9;
    }

    .restart {
      margin-top: 10px;
      background: #374151;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">Perplexity Billing Support Demo</div>

  <!-- CONTEXT BAR -->
  <div id="contextBar"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <select id="scenario">
      <option value="pro_computer_drain_first_time">Pro – Computer (First-time)</option>
      <option value="pro_computer_drain_repeat">Pro – Computer (Repeat)</option>
      <option value="enterprise_prospect">Enterprise – Prospect</option>
      <option value="enterprise_admin_billing_capabilities">Enterprise – Admin Billing</option>
    </select>

    <button onclick="startChat()">Start</button>
    <button class="restart" onclick="resetDemo()">Reset</button>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- INPUT -->
  <div class="inputBar">
    <input id="input" placeholder="Type your message..." />
    <button class="sendBtn" onclick="send()">Send</button>
  </div>

</div>

<script>
let scenarioId = null;
let sessionId = Math.random().toString(36).slice(2);

function startChat() {
  scenarioId = document.getElementById("scenario").value;

  const contextMap = {
    pro_computer_drain_first_time: "Pro Individual • Computer usage • First-time",
    pro_computer_drain_repeat: "Pro Individual • Computer usage • Repeat",
    enterprise_prospect: "Enterprise • Prospect flow",
    enterprise_admin_billing_capabilities: "Enterprise • Admin billing controls"
  };

  const bar = document.getElementById("contextBar");
  bar.style.display = "block";
  bar.innerText = "Context: " + contextMap[scenarioId];
}

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value;
  if (!message || !scenarioId) return;

  chat.innerHTML += `<div class="msg user">${message}</div>`;
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message, scenarioId, sessionId })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

  if (data.featureRequestLogged) {
    chat.innerHTML += `<div class="meta">Feature request logged</div>`;
  }

  if (data.escalate) {
    chat.innerHTML += `<div class="meta">Escalation: ${data.reason}</div>`;
    input.disabled = true;
  }

  chat.scrollTop = chat.scrollHeight;
}

function resetDemo() {
  sessionId = Math.random().toString(36).slice(2);
  scenarioId = null;

  document.getElementById("chat").innerHTML = "";
  document.getElementById("input").disabled = false;
  document.getElementById("contextBar").style.display = "none";
}
</script>

</body>
</html>
