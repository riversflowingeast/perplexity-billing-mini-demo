<!DOCTYPE html>
<html>
<head>
  <title>Perplexity Billing Support Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
    }

    #chat {
      border: 1px solid #ccc;
      padding: 12px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .msg-user {
      text-align: right;
      margin: 6px 0;
    }

    .msg-bot {
      text-align: left;
      margin: 6px 0;
    }

    #contextBox {
      background: #f5f5f5;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>Perplexity Billing Support Demo</h2>

  <!-- Scenario Selection -->
  <div id="scenarioSelect">
    <h4>Select Scenario</h4>
    <select id="scenario">
      <option value="pro_computer_drain_first_time">
        Pro Individual – Computer Usage Drain (First-time)
      </option>
      <option value="pro_computer_drain_repeat">
        Pro Individual – Computer Usage Drain (Repeat Use)
      </option>
      <option value="pro_standard_usage_question">
        Pro Individual – General Usage Question
      </option>
      <option value="billing_error_charge">
        Billing Error – Unexpected Charge
      </option>
      <option value="enterprise_contract">
        Enterprise – Contract / Billing
      </option>
    </select>

    <button onclick="startChat()">Start</button>
  </div>

  <!-- Scenario Context -->
  <div id="contextBox" style="display:none;"></div>

  <!-- Chat -->
  <div id="chat"></div>

  <input id="input" placeholder="Type message..." />
  <button onclick="send()">Send</button>

  <script>
    let scenarioId = null;
    let sessionId = Math.random().toString(36).substring(2);

    function startChat() {
      const select = document.getElementById("scenario");
      scenarioId = select.value;

      // Lock selection
      document.getElementById("scenarioSelect").style.display = "none";

      // Show context (lightweight, not too verbose)
      const contextMap = {
        pro_computer_drain_first_time: "Pro Individual • Computer feature • First-time usage",
        pro_computer_drain_repeat: "Pro Individual • Computer feature • Repeat usage",
        pro_standard_usage_question: "Pro Individual • General usage",
        billing_error_charge: "Billing issue • Unexpected charge",
        enterprise_contract: "Enterprise account • Contract/billing"
      };

      const box = document.getElementById("contextBox");
      box.style.display = "block";
      box.innerText = "Context: " + contextMap[scenarioId];
    }

    async function send() {
      const input = document.getElementById("input");
      const chat = document.getElementById("chat");

      const message = input.value;
      if (!message) return;

      chat.innerHTML += `<div class="msg-user">${message}</div>`;

      input.value = "";

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message,
          scenarioId,
          sessionId
        })
      });

      const data = await res.json();

      chat.innerHTML += `<div class="msg-bot">${data.reply}</div>`;

      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>
</html>
